#region Custom site properties
#endregion Custom site properties

theme: jekyll-theme-chirpy
lang: en
timezone: America/Los_Angeles

# jekyll-seo-tag settings › https://github.com/jekyll/jekyll-seo-tag/blob/master/docs/usage.md
# ↓ --------------------------

title: DevOps Jeremy
author:
  name: Jeremy
  email: DevOpsJeremy@gmail.com

#TODO: Come up with a good tagline
#tagline: Welcome to my site!

description: >-
  My name is Jeremy. I'm a DevOps Engineer and I'm passionate about fitness, steak, and nerdy stuff.

url: "https://DevOpsJeremy.github.io"

github:
  username: DevOpsJeremy
twitter:
  username: DevOpsJeremy

social:
  name: Jeremy Watkins
  email: DevOpsJeremy@gmail.com
  links:
    - https://twitter.com/DevOpsJeremy
    - https://github.com/DevOpsJeremy
    - https://linkedin.com/in/jeremiah-watkins

#google_site_verification: # fill in to your verification string

#google_analytics:
#  id: # fill in your Google Analytics ID

# Prefered color scheme setting
#theme_mode: dark

avatar: assets/images/avatar.CR2

# The URL of the site-wide social preview image used in SEO `og:image` meta tag.
# It can be overridden by a customized `page.image` in front matter.
# social_preview_image: # string, local or CORS resources

toc: true

comments:
  active: true
  utterances:
    repo: DevOpsJeremy/DevOpsJeremy.github.io
    issue_term: # < url | pathname | title | ...>

paginate: 10

baseurl: ""

kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts: # Rouge Options › https://github.com/jneen/rouge#full-options
    css_class: highlight
    # default_lang: console
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: "" # An empty string here means all files in the project
      type: posts
    values:
      layout: post
      comments: true # Enable comments in posts.
      toc: true # Display TOC column in posts.
      # DO NOT modify the following parameter unless you are confident enough
      # to update the code of all other post links in this project.
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs # see `site.collections`
    values:
      layout: page
      permalink: /:title/
  - scope:
      path: assets/js/dist
    values:
      swcache: true

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - rollup.config.js
  - package*.json

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
